name: Public readiness

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  public-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest httpx fastapi PyYAML pydantic jsonschema

      - name: Run public readiness checks
        run: |
          python -m pytest \
            test/test_docs_consistency.py \
            test/test_branding_contextarium.py \
            test/test_public_release_readiness.py \
            test/test_ui_static_assets.py \
            test/test_dashboard_guidelines_info_cards.py
